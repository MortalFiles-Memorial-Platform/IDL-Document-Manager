services:
  - type: web
    name: idl-ris
    runtime: node
    buildCommand: cd idl-ris && npm ci && npm run db:generate && npm run build
    startCommand: cd idl-ris && npx prisma migrate deploy --schema ./prisma/schema.prisma && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # Set from Render environment at runtime
        sync: false
      - key: DIRECT_URL
        # Set from Render environment at runtime
        sync: false
      - key: JWT_SECRET
        # Set from Render environment at runtime
        sync: false
