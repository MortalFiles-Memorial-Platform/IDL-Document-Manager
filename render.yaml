services:
  - type: web
    name: idl-ris
    runtime: node
    workingDirectory: idl-ris
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npx prisma migrate deploy --schema=./prisma/schema.prisma && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        # Set from Render environment at runtime
        sync: false
      - key: DIRECT_URL
        # Set from Render environment at runtime
        sync: false
      - key: JWT_SECRET
        # Set from Render environment at runtime
        sync: false
